<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Production UI Import</title>
    <link rel="stylesheet" href="ui.css">
  </head>
  <body>
    <main>
      <div class="plugin-title-row">
        <h1>Import .figcapture</h1>
        <span id="plugin-version" class="plugin-version">v__PLUGIN_VERSION__</span>
      </div>
      <input id="capture-file" type="file" accept=".figcapture">
      <section id="import-status" aria-live="polite">Ready</section>
      <section id="import-error" aria-live="polite">
        <span id="import-error-category"></span>
      </section>
      <section id="import-report" hidden>
        <h2>Import report</h2>
        <dl>
          <div><dt>Frames</dt><dd id="created-frame-count">0</dd></div>
          <div><dt>Nodes</dt><dd id="created-node-count">0</dd></div>
          <div><dt>Fallbacks</dt><dd id="import-fallback-count">0</dd></div>
          <div><dt>Missing assets</dt><dd id="import-missing-asset-count">0</dd></div>
          <div><dt>Unsupported styles</dt><dd id="import-unsupported-style-count">0</dd></div>
          <div><dt>Font substitutions</dt><dd id="font-substitution-count">0</dd></div>
          <div><dt>Font details</dt><dd id="font-substitution-summary"></dd></div>
          <div><dt>Auto layout</dt><dd id="auto-layout-confidence-summary">0 applied / 0 skipped / 0</dd></div>
        </dl>
      </section>
    </main>
    <script type="module" src="ui.js"></script>
  </body>
</html>
